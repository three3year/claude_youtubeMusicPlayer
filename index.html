<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prism Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent-pink: #EC4899;
      --accent-pink-dark: #DB2777;
      --accent-pink-light: #F472B6;
      --accent-blue: #3B82F6;
      --accent-blue-light: #60A5FA;
      --bg-page-start: #FFF0F5;
      --bg-page-mid: #F0F8FF;
      --bg-page-end: #E6E6FA;
      --bg-surface-frosted: rgba(255,255,255,0.6);
      --bg-surface-muted: rgba(255,255,255,0.5);
      --text-primary: #1E293B;
      --text-secondary: #64748B;
      --text-tertiary: #94A3B8;
      --text-muted: #CBD5E1;
      --border-default: #E2E8F0;
      --border-glass: rgba(255,255,255,0.4);
      --border-accent-pink: #FBCFE8;
      --radius-sm: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-circle: 9999px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--bg-page-start) 0%, var(--bg-page-mid) 50%, var(--bg-page-end) 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text-primary);
      padding-bottom: 100px;
    }

    /* ── URL Input Card ── */
    .input-card {
      max-width: 640px;
      margin: 24px auto;
      padding: 16px 20px;
      background: var(--bg-surface-frosted);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-xl);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-card input[type="text"] {
      flex: 1;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      background: rgba(255,255,255,0.8);
      color: var(--text-primary);
      transition: border-color 0.15s;
    }

    .input-card input[type="text"]:focus {
      border-color: var(--accent-pink-light);
    }

    .btn-gradient {
      background: linear-gradient(135deg, var(--accent-pink-light), var(--accent-blue-light));
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: filter 0.15s, transform 0.15s;
      white-space: nowrap;
    }

    .btn-gradient:hover {
      filter: brightness(1.1);
      transform: scale(1.03);
    }

    .error-msg {
      color: #EF4444;
      font-size: 12px;
      margin-top: -8px;
      margin-bottom: 8px;
      text-align: center;
      display: none;
    }

    /* ── Main Content ── */
    .main-content {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Timestamp Input Section ── */
    .ts-input-card {
      background: var(--bg-surface-frosted);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-xl);
      padding: 16px 20px;
    }

    .ts-input-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .ts-single-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .ts-single-row input {
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      background: rgba(255,255,255,0.8);
      color: var(--text-primary);
      transition: border-color 0.15s;
    }

    .ts-single-row input:focus {
      border-color: var(--accent-pink-light);
    }

    .ts-single-row input.ts-time {
      width: 100px;
    }

    .ts-single-row input.ts-label {
      flex: 1;
    }

    .ts-single-row button {
      padding: 8px 16px;
      font-size: 13px;
    }

    .batch-section {
      margin-top: 4px;
    }

    .batch-section summary {
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
      margin-bottom: 8px;
    }

    .batch-section textarea {
      width: 100%;
      height: 80px;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-family: 'DM Sans', monospace;
      font-size: 12px;
      outline: none;
      resize: vertical;
      background: rgba(255,255,255,0.8);
      color: var(--text-primary);
      transition: border-color 0.15s;
    }

    .batch-section textarea:focus {
      border-color: var(--accent-pink-light);
    }

    .batch-section .batch-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-sm {
      background: linear-gradient(135deg, var(--accent-pink-light), var(--accent-blue-light));
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-family: inherit;
      font-weight: 500;
      font-size: 12px;
      cursor: pointer;
      transition: filter 0.15s;
    }

    .btn-sm:hover { filter: brightness(1.1); }

    .btn-outline {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-family: inherit;
      font-weight: 500;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-outline:hover {
      border-color: var(--accent-pink-light);
      color: var(--accent-pink);
    }

    /* ── Timeline List ── */
    .timeline-card {
      background: var(--bg-surface-frosted);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-xl);
      padding: 16px 20px;
    }

    .timeline-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .timeline-empty {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 13px;
      padding: 24px 0;
    }

    .timeline-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .timeline-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }

    .timeline-item:hover {
      background: rgba(255,255,255,0.5);
    }

    .timeline-item.active {
      background: rgba(236,72,153,0.08);
      border-left-color: var(--accent-pink);
    }

    .timeline-item .ts-index {
      font-size: 11px;
      color: var(--text-tertiary);
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .timeline-item .ts-time-display {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-pink-dark);
      font-family: 'DM Sans', monospace;
      width: 70px;
      flex-shrink: 0;
    }

    .timeline-item .ts-title {
      flex: 1;
      font-size: 13px;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timeline-item .ts-delete {
      opacity: 0;
      border: none;
      background: none;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .timeline-item:hover .ts-delete {
      opacity: 1;
    }

    .timeline-item .ts-delete:hover {
      color: #EF4444;
      background: rgba(239,68,68,0.1);
    }

    /* ── Player Bar ── */
    .player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: var(--bg-surface-frosted);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-glass);
      z-index: 100;
      display: none;
    }

    .player-bar.visible {
      display: block;
    }

    .player-bar-inner {
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 16px;
      gap: 16px;
    }

    /* Left column */
    .player-left {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .player-art {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent-pink-light), var(--accent-blue-light));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .player-art svg { width: 22px; height: 22px; color: white; }

    .player-info {
      min-width: 0;
      flex: 1;
    }

    .player-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-subtitle {
      font-size: 10px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Center column */
    .player-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 0;
    }

    .transport-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .transport-btn {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 4px;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .transport-btn:hover { color: var(--text-primary); }

    .transport-btn svg { width: 18px; height: 18px; }

    .play-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-circle);
      background: linear-gradient(135deg, var(--accent-pink-light), var(--accent-blue-light));
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, filter 0.15s;
    }

    .play-btn:hover {
      transform: scale(1.1);
      filter: brightness(1.1);
    }

    .play-btn svg { width: 18px; height: 18px; }

    /* Progress bar */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 480px;
    }

    .progress-time {
      font-size: 10px;
      color: var(--text-tertiary);
      font-family: 'DM Sans', monospace;
      min-width: 36px;
      flex-shrink: 0;
    }

    .progress-time.left { text-align: right; }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border-default);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent-pink-light), var(--accent-blue-light));
      transition: width 0.2s;
      pointer-events: none;
    }

    .progress-scrubber {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      border: 2px solid var(--accent-pink-light);
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }

    .progress-bar:hover .progress-scrubber { opacity: 1; }

    @media (pointer: coarse) {
      .progress-scrubber { opacity: 1 !important; }
    }

    /* Right column: volume */
    .player-right {
      width: 200px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .vol-btn {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .vol-btn:hover { color: var(--text-primary); }

    .vol-btn svg { width: 18px; height: 18px; }

    .vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 4px;
      border-radius: var(--radius-circle);
      outline: none;
      cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      border: 2px solid var(--accent-pink-light);
      cursor: pointer;
    }

    .vol-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      border: 2px solid var(--accent-pink-light);
      cursor: pointer;
    }

    /* Hidden YouTube iframe */
    .yt-hidden {
      position: fixed;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .input-card {
        margin: 16px 12px;
      }

      .main-content {
        padding: 0 12px;
      }

      .player-bar { height: auto; }

      .player-bar-inner {
        flex-direction: column;
        padding: 8px 16px 12px;
        gap: 6px;
      }

      .player-left { display: none; }

      .player-right {
        width: 100%;
        justify-content: center;
      }

      .player-center { width: 100%; }

      .progress-row { max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- URL Input -->
  <div class="input-card">
    <input type="text" id="url-input" placeholder="Paste YouTube URL..." autocomplete="off">
    <button class="btn-gradient" id="load-btn">Load</button>
  </div>
  <div class="error-msg" id="url-error"></div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Timestamp Input -->
    <div class="ts-input-card">
      <h3>Timestamps</h3>
      <div class="ts-single-row">
        <input type="text" class="ts-time" id="ts-time-input" placeholder="M:SS">
        <input type="text" class="ts-label" id="ts-label-input" placeholder="Title (optional)">
        <button class="btn-sm" id="ts-add-btn">Add</button>
      </div>
      <details class="batch-section">
        <summary>Batch input</summary>
        <textarea id="batch-input" placeholder="One per line, e.g.:\n1:30 Song A\n5:00 Song B\n10:30:00 Song C"></textarea>
        <div class="batch-actions">
          <button class="btn-sm" id="batch-add-btn">Add all</button>
          <button class="btn-outline" id="batch-clear-btn">Clear list</button>
        </div>
      </details>
    </div>

    <!-- Timeline -->
    <div class="timeline-card">
      <h3>Timeline <span id="timeline-count" style="font-weight:400;color:var(--text-tertiary);font-size:12px;"></span></h3>
      <div id="timeline-empty" class="timeline-empty">No timestamps yet</div>
      <ul id="timeline-list" class="timeline-list"></ul>
    </div>
  </div>

  <!-- Player Bar -->
  <div class="player-bar" id="player-bar">
    <div class="player-bar-inner">
      <!-- Left: track info -->
      <div class="player-left">
        <div class="player-art">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <div class="player-info">
          <div class="player-title" id="player-title">-</div>
          <div class="player-subtitle" id="player-subtitle">-</div>
        </div>
      </div>

      <!-- Center: controls + progress -->
      <div class="player-center">
        <div class="transport-row">
          <button class="transport-btn" id="prev-btn" title="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 20L9 12l10-8v16zM5 4h2v16H5V4z"/></svg>
          </button>
          <button class="play-btn" id="play-pause-btn" title="Play">
            <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
          </button>
          <button class="transport-btn" id="next-btn" title="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 4l10 8-10 8V4zM17 4h2v16h-2V4z"/></svg>
          </button>
        </div>
        <div class="progress-row">
          <span class="progress-time left" id="time-current">0:00</span>
          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            <div class="progress-scrubber" id="progress-scrubber" style="left:0%"></div>
          </div>
          <span class="progress-time" id="time-total">0:00</span>
        </div>
      </div>

      <!-- Right: volume -->
      <div class="player-right">
        <button class="vol-btn" id="vol-btn" title="Mute">
          <svg id="icon-vol-high" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          <svg id="icon-vol-low" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          <svg id="icon-vol-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        </button>
        <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="75">
      </div>
    </div>
  </div>

  <!-- Hidden YouTube player target -->
  <div class="yt-hidden" id="yt-container">
    <div id="yt-player"></div>
  </div>

  <script>
    // ── State ──
    let player = null;
    let isPlaying = false;
    let currentTime = 0;
    let duration = 0;
    let volume = 75;
    let isMuted = false;
    let timeUpdateInterval = null;
    let currentVideoId = null;
    let apiReady = false;
    let timestamps = []; // { time: number, label: string }

    // ── DOM refs ──
    const urlInput = document.getElementById('url-input');
    const loadBtn = document.getElementById('load-btn');
    const urlError = document.getElementById('url-error');
    const playerBar = document.getElementById('player-bar');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const iconPlay = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const timeCurrent = document.getElementById('time-current');
    const timeTotal = document.getElementById('time-total');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const progressScrubber = document.getElementById('progress-scrubber');
    const volBtn = document.getElementById('vol-btn');
    const volSlider = document.getElementById('vol-slider');
    const iconVolHigh = document.getElementById('icon-vol-high');
    const iconVolLow = document.getElementById('icon-vol-low');
    const iconVolMuted = document.getElementById('icon-vol-muted');
    const playerTitle = document.getElementById('player-title');
    const playerSubtitle = document.getElementById('player-subtitle');
    const tsTimeInput = document.getElementById('ts-time-input');
    const tsLabelInput = document.getElementById('ts-label-input');
    const tsAddBtn = document.getElementById('ts-add-btn');
    const batchInput = document.getElementById('batch-input');
    const batchAddBtn = document.getElementById('batch-add-btn');
    const batchClearBtn = document.getElementById('batch-clear-btn');
    const timelineList = document.getElementById('timeline-list');
    const timelineEmpty = document.getElementById('timeline-empty');
    const timelineCount = document.getElementById('timeline-count');

    // ── Utilities (ported from lib/utils.ts) ──
    function extractVideoId(url) {
      const watchMatch = url.match(/youtube\.com\/watch\?(?:.*&)?v=([a-zA-Z0-9_-]+)/);
      if (watchMatch) return watchMatch[1];
      const liveMatch = url.match(/youtube\.com\/live\/([a-zA-Z0-9_-]+)/);
      if (liveMatch) return liveMatch[1];
      const shortMatch = url.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
      if (shortMatch) return shortMatch[1];
      return null;
    }

    function formatTime(seconds) {
      if (!isFinite(seconds) || seconds < 0) return '0:00';
      const s = Math.floor(seconds);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) {
        return h + ':' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
      }
      return m + ':' + String(sec).padStart(2, '0');
    }

    function parseTime(str) {
      str = str.trim();
      const parts = str.split(':').map(Number);
      if (parts.some(isNaN)) return null;
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      if (parts.length === 1) return parts[0];
      return null;
    }

    // ── YouTube IFrame API ──
    function loadYTApi() {
      if (window.YT && window.YT.Player) { apiReady = true; return; }
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      const first = document.getElementsByTagName('script')[0];
      first.parentNode.insertBefore(tag, first);
    }

    window.onYouTubeIframeAPIReady = function() {
      apiReady = true;
    };

    loadYTApi();

    // ── Load volume from localStorage ──
    (function loadSettings() {
      try {
        const sv = localStorage.getItem('prism_volume');
        if (sv !== null) { volume = Number(sv); volSlider.value = volume; }
        const sm = localStorage.getItem('prism_muted');
        if (sm === 'true') isMuted = true;
      } catch(e) {}
      updateVolSliderBg();
      updateVolIcon();
    })();

    // ── Video Loading ──
    function loadVideo(videoId) {
      showError('');
      if (!apiReady) {
        showError('YouTube API is loading, please wait...');
        return;
      }

      if (player && currentVideoId === videoId) {
        // Same video, just restart
        player.seekTo(0, true);
        player.playVideo();
        return;
      }

      if (player) {
        currentVideoId = videoId;
        player.loadVideoById({ videoId: videoId, startSeconds: 0 });
        return;
      }

      currentVideoId = videoId;
      player = new YT.Player('yt-player', {
        height: '360',
        width: '640',
        videoId: videoId,
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0,
          origin: window.location.origin,
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange,
          onError: onPlayerError,
        },
      });
    }

    function onPlayerReady(event) {
      duration = event.target.getDuration() || 0;
      event.target.setVolume(volume);
      if (isMuted) event.target.mute(); else event.target.unMute();
      event.target.playVideo();
      isPlaying = true;
      updatePlayPauseIcon();
      updateTimeDisplay();
      startTimePolling();
      playerBar.classList.add('visible');
      updatePlayerInfo();
    }

    function onPlayerStateChange(event) {
      if (event.data === 1) { // PLAYING
        isPlaying = true;
        const d = event.target.getDuration && event.target.getDuration();
        if (d > 0) duration = d;
        updatePlayerInfo();
      } else if (event.data === 2) { // PAUSED
        isPlaying = false;
      } else if (event.data === 0) { // ENDED
        isPlaying = false;
      }
      updatePlayPauseIcon();
    }

    function onPlayerError(event) {
      const code = event.data;
      if (code === 100) showError('Video not found or removed');
      else if (code === 101 || code === 150) showError('Video cannot be embedded');
      else showError('Playback error (' + code + ')');
    }

    // ── Time Polling (500ms, matching original) ──
    function startTimePolling() {
      if (timeUpdateInterval) clearInterval(timeUpdateInterval);
      timeUpdateInterval = setInterval(function() {
        if (!player || !player.getCurrentTime) return;
        currentTime = player.getCurrentTime();
        duration = player.getDuration() || duration;
        updateTimeDisplay();
        updateActiveTimestamp();
      }, 500);
    }

    // ── Controls ──
    function togglePlayPause() {
      if (!player) return;
      if (isPlaying) {
        player.pauseVideo();
        isPlaying = false;
      } else {
        player.playVideo();
        isPlaying = true;
      }
      updatePlayPauseIcon();
    }

    function seekTo(seconds) {
      if (!player) return;
      player.seekTo(seconds, true);
      currentTime = seconds;
      updateTimeDisplay();
    }

    function setVolumeTo(val) {
      volume = Math.max(0, Math.min(100, val));
      if (player && player.setVolume) player.setVolume(volume);
      if (volume > 0 && isMuted) {
        isMuted = false;
        if (player && player.unMute) player.unMute();
      }
      try { localStorage.setItem('prism_volume', String(volume)); } catch(e) {}
      try { localStorage.setItem('prism_muted', String(isMuted)); } catch(e) {}
      updateVolSliderBg();
      updateVolIcon();
    }

    function toggleMute() {
      isMuted = !isMuted;
      if (player) {
        if (isMuted) { player.mute && player.mute(); }
        else { player.unMute && player.unMute(); }
      }
      try { localStorage.setItem('prism_muted', String(isMuted)); } catch(e) {}
      updateVolIcon();
    }

    // ── Prev / Next (timestamp-based) ──
    function getCurrentTimestampIndex() {
      if (timestamps.length === 0) return -1;
      // Find the last timestamp whose time <= currentTime
      let idx = -1;
      for (let i = 0; i < timestamps.length; i++) {
        if (timestamps[i].time <= currentTime + 0.5) idx = i;
        else break;
      }
      return idx;
    }

    function goToNext() {
      if (timestamps.length === 0 || !player) return;
      // Find the first timestamp with time > currentTime
      let nextIdx = -1;
      for (let i = 0; i < timestamps.length; i++) {
        if (timestamps[i].time > currentTime + 0.5) {
          nextIdx = i;
          break;
        }
      }
      if (nextIdx === -1) return; // Already at or past last
      seekTo(timestamps[nextIdx].time);
      updatePlayerTrackInfo(nextIdx);
    }

    function goToPrev() {
      if (timestamps.length === 0 || !player) return;
      const curIdx = getCurrentTimestampIndex();
      if (curIdx < 0) {
        // Before first timestamp, seek to first
        seekTo(timestamps[0].time);
        updatePlayerTrackInfo(0);
        return;
      }
      const timeSinceStart = currentTime - timestamps[curIdx].time;
      if (timeSinceStart > 3) {
        // More than 3 seconds in, restart current
        seekTo(timestamps[curIdx].time);
      } else {
        // Go to previous
        const prevIdx = curIdx - 1;
        if (prevIdx >= 0) {
          seekTo(timestamps[prevIdx].time);
          updatePlayerTrackInfo(prevIdx);
        } else {
          seekTo(timestamps[0].time);
          updatePlayerTrackInfo(0);
        }
      }
    }

    // ── Timestamp Management ──
    function addTimestamp(timeStr, label) {
      const time = parseTime(timeStr);
      if (time === null || time < 0) return false;
      // Avoid duplicates
      if (timestamps.some(function(t) { return t.time === time; })) return false;
      timestamps.push({ time: time, label: label || '' });
      timestamps.sort(function(a, b) { return a.time - b.time; });
      renderTimeline();
      return true;
    }

    function removeTimestamp(index) {
      timestamps.splice(index, 1);
      renderTimeline();
    }

    function parseBatchTimestamps(text) {
      const lines = text.split('\n');
      let added = 0;
      lines.forEach(function(line) {
        line = line.trim();
        if (!line) return;
        // Try to match time at start: "H:MM:SS label" or "M:SS label"
        const match = line.match(/^(\d{1,2}(?::\d{2}){1,2})\s*(.*)/);
        if (match) {
          if (addTimestamp(match[1], match[2])) added++;
        }
      });
      return added;
    }

    function clearAllTimestamps() {
      timestamps = [];
      renderTimeline();
    }

    // ── UI Updates ──
    function renderTimeline() {
      timelineList.innerHTML = '';
      if (timestamps.length === 0) {
        timelineEmpty.style.display = 'block';
        timelineCount.textContent = '';
        return;
      }
      timelineEmpty.style.display = 'none';
      timelineCount.textContent = '(' + timestamps.length + ')';
      const curIdx = getCurrentTimestampIndex();

      timestamps.forEach(function(ts, i) {
        const li = document.createElement('li');
        li.className = 'timeline-item' + (i === curIdx ? ' active' : '');
        li.setAttribute('data-index', i);
        li.innerHTML =
          '<span class="ts-index">' + (i + 1) + '</span>' +
          '<span class="ts-time-display">' + formatTime(ts.time) + '</span>' +
          '<span class="ts-title">' + escapeHtml(ts.label || '-') + '</span>' +
          '<button class="ts-delete" title="Delete">&times;</button>';
        li.addEventListener('click', function(e) {
          if (e.target.classList.contains('ts-delete')) {
            removeTimestamp(i);
            return;
          }
          if (player) {
            seekTo(ts.time);
            if (!isPlaying) { player.playVideo(); isPlaying = true; updatePlayPauseIcon(); }
            updatePlayerTrackInfo(i);
          }
        });
        timelineList.appendChild(li);
      });
    }

    function updateActiveTimestamp() {
      const curIdx = getCurrentTimestampIndex();
      const items = timelineList.querySelectorAll('.timeline-item');
      items.forEach(function(item, i) {
        if (i === curIdx) {
          if (!item.classList.contains('active')) {
            item.classList.add('active');
            // Auto-scroll into view
            item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          }
        } else {
          item.classList.remove('active');
        }
      });
      // Update player bar info
      if (curIdx >= 0) updatePlayerTrackInfo(curIdx);
    }

    function updatePlayerTrackInfo(idx) {
      if (idx >= 0 && idx < timestamps.length) {
        const ts = timestamps[idx];
        playerTitle.textContent = ts.label || 'Track ' + (idx + 1);
        playerSubtitle.textContent = formatTime(ts.time);
      }
    }

    function updatePlayerInfo() {
      if (timestamps.length === 0 && player) {
        // No timestamps, show video info
        try {
          const data = player.getVideoData && player.getVideoData();
          if (data && data.title) {
            playerTitle.textContent = data.title;
            playerSubtitle.textContent = data.author || '';
          }
        } catch(e) {}
      }
    }

    function updatePlayPauseIcon() {
      iconPlay.style.display = isPlaying ? 'none' : 'block';
      iconPause.style.display = isPlaying ? 'block' : 'none';
      playPauseBtn.title = isPlaying ? 'Pause' : 'Play';
    }

    function updateTimeDisplay() {
      const pct = duration > 0 ? (currentTime / duration) * 100 : 0;
      const clamped = Math.min(100, Math.max(0, pct));
      progressFill.style.width = clamped + '%';
      progressScrubber.style.left = clamped + '%';
      timeCurrent.textContent = formatTime(currentTime);
      timeTotal.textContent = duration > 0 ? formatTime(duration) : '--:--';
    }

    function updateVolSliderBg() {
      const pct = isMuted ? 0 : volume;
      volSlider.style.background = 'linear-gradient(90deg, var(--accent-pink-light) ' + pct + '%, var(--border-default) ' + pct + '%)';
    }

    function updateVolIcon() {
      const show = isMuted ? 'muted' : (volume > 50 ? 'high' : 'low');
      iconVolHigh.style.display = show === 'high' ? 'block' : 'none';
      iconVolLow.style.display = show === 'low' ? 'block' : 'none';
      iconVolMuted.style.display = show === 'muted' ? 'block' : 'none';
    }

    function showError(msg) {
      urlError.textContent = msg;
      urlError.style.display = msg ? 'block' : 'none';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Event Listeners ──
    // Load video
    loadBtn.addEventListener('click', function() {
      const url = urlInput.value.trim();
      if (!url) { showError('Please enter a URL'); return; }
      const vid = extractVideoId(url);
      if (!vid) { showError('Invalid YouTube URL'); return; }
      loadVideo(vid);
    });

    urlInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loadBtn.click();
    });

    // Play/Pause
    playPauseBtn.addEventListener('click', togglePlayPause);
    prevBtn.addEventListener('click', goToPrev);
    nextBtn.addEventListener('click', goToNext);

    // Progress bar: click to seek
    let isDraggingProgress = false;

    function seekFromEvent(e) {
      const rect = progressBar.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      seekTo(pct * duration);
    }

    progressBar.addEventListener('mousedown', function(e) {
      isDraggingProgress = true;
      seekFromEvent(e);
    });

    document.addEventListener('mousemove', function(e) {
      if (isDraggingProgress) seekFromEvent(e);
    });

    document.addEventListener('mouseup', function() {
      isDraggingProgress = false;
    });

    progressBar.addEventListener('touchstart', function(e) {
      isDraggingProgress = true;
      seekFromEvent(e);
    }, { passive: true });

    progressBar.addEventListener('touchmove', function(e) {
      if (isDraggingProgress) seekFromEvent(e);
    }, { passive: true });

    progressBar.addEventListener('touchend', function() {
      isDraggingProgress = false;
    });

    // Volume
    volSlider.addEventListener('input', function() {
      setVolumeTo(Number(this.value));
    });

    volBtn.addEventListener('click', function() {
      toggleMute();
      updateVolSliderBg();
    });

    // Timestamp input
    tsAddBtn.addEventListener('click', function() {
      const timeStr = tsTimeInput.value.trim();
      if (!timeStr) return;
      if (addTimestamp(timeStr, tsLabelInput.value.trim())) {
        tsTimeInput.value = '';
        tsLabelInput.value = '';
        tsTimeInput.focus();
      }
    });

    tsTimeInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        tsAddBtn.click();
      }
    });

    tsLabelInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        tsAddBtn.click();
      }
    });

    // Batch input
    batchAddBtn.addEventListener('click', function() {
      const text = batchInput.value;
      if (!text.trim()) return;
      const count = parseBatchTimestamps(text);
      if (count > 0) batchInput.value = '';
    });

    batchClearBtn.addEventListener('click', function() {
      if (timestamps.length === 0) return;
      clearAllTimestamps();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      const active = document.activeElement;
      const isInput = active instanceof HTMLInputElement ||
                      active instanceof HTMLTextAreaElement ||
                      active instanceof HTMLSelectElement;

      if (e.code === 'Space' && !isInput && player) {
        e.preventDefault();
        togglePlayPause();
      }

      if (e.key === 'ArrowLeft' && !isInput && player) {
        e.preventDefault();
        seekTo(Math.max(0, currentTime - 5));
      }

      if (e.key === 'ArrowRight' && !isInput && player) {
        e.preventDefault();
        seekTo(Math.min(duration, currentTime + 5));
      }
    });
  </script>
</body>
</html>
